name: Deploy site to GitHub Pages

# Builds the Next.js static export under `site/` and deploys it to GitHub
# Pages. Site URL after deploy: https://mangowhoiscloud.github.io/geode/
#
# Triggers on changes to `site/**`, this workflow, or any of the SOT files
# that `sync-stats` reads (CHANGELOG.md, pyproject.toml, CLAUDE.md). A docs
# page like `/docs/reference/changelog` therefore stays in sync with
# CHANGELOG.md without a separate commit to `site/`.
#
# Daily 09:00 KST cron also runs as a safety net so the docs page can never
# fall more than 24 hours behind even if Pages settings get changed by an
# accidental admin action.
#
# Prerequisite: enable Pages once via repo Settings → Pages → Source =
# "GitHub Actions". The deploy action handles the rest.

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "docs/petri-bundle/**"
      - "docs/audits/**"
      - "plugins/petri_audit/judge_dims/**"
      - "CHANGELOG.md"
      - "pyproject.toml"
      - "CLAUDE.md"
      - ".pymarkdown.json"
      - ".yamllint.yaml"
      - ".github/workflows/pages.yml"
  pull_request:
    paths:
      - "site/**"
      - "docs/petri-bundle/**"
      - "docs/audits/**"
      - "plugins/petri_audit/judge_dims/**"
      - ".pymarkdown.json"
      - ".yamllint.yaml"
      - ".github/workflows/pages.yml"
  schedule:
    # 09:00 KST = 00:00 UTC. Daily safety-net rebuild.
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Render-lint gate — fails fast on malformed markdown/YAML/JSON
  # before we burn the full Next.js build. See
  # docs/architecture/render-lint.md for the rule rationale.
  lint:
    name: Render lint (markdown + YAML + JSON)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint tools (pinned)
        run: |
          python -m pip install --upgrade pip
          # Versions pinned to match .pre-commit-config.yaml so local
          # `pre-commit run` and CI report the same violations.
          pip install yamllint==1.38.0 pymarkdownlnt==0.9.37

      - name: yamllint — petri YAML
        run: |
          shopt -s nullglob
          targets=(
            plugins/petri_audit/judge_dims/*.yaml
            plugins/petri_audit/judge_dims/*.yml
            docs/petri-bundle/*.yaml
            docs/petri-bundle/*.yml
          )
          if [ "${#targets[@]}" -eq 0 ]; then
            echo "no YAML targets — skipping"
            exit 0
          fi
          yamllint --strict -c .yamllint.yaml "${targets[@]}"
        shell: bash

      - name: pymarkdown — Pages-published docs
        # The allowlist of render-gated files lives in
        # scripts/lint_pages_markdown.sh so pre-commit and CI lint the
        # same set. See docs/architecture/render-lint.md for the
        # legacy-doc carve-out policy.
        run: scripts/lint_pages_markdown.sh

      - name: JSON parse — petri bundle assets
        run: |
          shopt -s globstar nullglob
          targets=( docs/petri-bundle/**/*.json )
          if [ "${#targets[@]}" -eq 0 ]; then
            echo "no JSON targets — skipping"
            exit 0
          fi
          for f in "${targets[@]}"; do
            echo "validating $f"
            python -m json.tool "$f" > /dev/null
          done
        shell: bash

  build:
    name: Build (Next.js static export)
    needs: lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: site/package-lock.json

      # Run the petri ratchet BEFORE npm install/build. A corrupt bundle
      # must fail fast and independently of the Next.js build — that way a
      # site build failure (unrelated to petri) doesn't mask a regression
      # in the published archives, and a bundle regression doesn't waste a
      # full site build. See .github/workflows/petri-publish.yml for the
      # PR-gate counterpart.
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dev group (zipfile-zstd for validator)
        working-directory: ${{ github.workspace }}
        run: uv sync

      - name: Validate docs/petri-bundle (deep — pre-build gate)
        working-directory: ${{ github.workspace }}
        run: uv run python scripts/validate_petri_bundle.py

      - name: Sync GEODE stats into site SOT
        run: npm run sync-stats
        env:
          GEODE_REPO: ${{ github.workspace }}

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build

      - name: Copy docs/petri-bundle into site/out
        working-directory: ${{ github.workspace }}
        run: |
          if [ -d docs/petri-bundle ]; then
            mkdir -p site/out/petri-bundle
            cp -R docs/petri-bundle/. site/out/petri-bundle/
            echo "petri-bundle copied:"
            ls -la site/out/petri-bundle/ | head -20
          else
            echo "docs/petri-bundle missing — skipping copy"
          fi

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/out

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
