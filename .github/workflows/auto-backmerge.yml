name: Backmerge main → develop (safety net)

# CSP-14 (2026-05-23) — safety net for the rotation release pattern
# documented in ``.claude/skills/geode-gitflow/SKILL.md``. Under the
# rotation pattern the release branch lands on develop FIRST, so
# develop never lags behind main on stamps / CHANGELOG. This workflow
# exists for the off-nominal case where:
#
#   - someone reverts the rotation pattern,
#   - a hotfix lands on main directly (in an emergency),
#   - or any future automation drifts main ahead of develop.
#
# When fired, it opens a PR backmerging main → develop. Manual review
# intervenes only if conflicts surface; the standard fast-forward path
# is auto-pushed by the action.
#
# Trigger: any push to main. The job runs cheap (single git fetch +
# compare) and exits early when develop already contains main's tip.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  backmerge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout develop
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if develop already contains main's tip
        id: check
        run: |
          set -eux
          git fetch origin main:origin-main
          AHEAD=$(git rev-list --count HEAD..origin-main)
          echo "ahead=$AHEAD" >> "$GITHUB_OUTPUT"
          if [ "$AHEAD" = "0" ]; then
            echo "develop already ahead of or equal to main — rotation pattern worked, no backmerge needed."
          else
            echo "develop is $AHEAD commits behind main — opening backmerge PR."
          fi

      - name: Attempt fast-forward backmerge
        if: steps.check.outputs.ahead != '0'
        id: ff
        run: |
          set -eux
          BRANCH="chore/auto-backmerge-$(date -u +%Y%m%d-%H%M%S)"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git checkout -b "$BRANCH"

          # Try fast-forward first (rotation pattern's normal case).
          if git merge --ff-only origin-main 2>/dev/null; then
            echo "merged=ff" >> "$GITHUB_OUTPUT"
          elif git merge --no-edit origin-main; then
            echo "merged=merge" >> "$GITHUB_OUTPUT"
          else
            echo "merged=conflict" >> "$GITHUB_OUTPUT"
            git merge --abort || true
          fi

          git push origin "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Open backmerge PR
        if: |
          steps.check.outputs.ahead != '0' &&
          steps.ff.outputs.merged != 'conflict'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eux
          gh pr create \
            --base develop \
            --head "${{ steps.ff.outputs.branch }}" \
            --title "chore: auto-backmerge main → develop" \
            --body "$(cat <<EOF
          ## Summary
          Automated safety-net backmerge. Triggered by a push to main where
          develop was \`${{ steps.check.outputs.ahead }}\` commits behind.

          Under the rotation release pattern (\`geode-gitflow\` skill,
          \`## Release Flow\`) this PR should rarely fire — release
          branches normally land on develop first. If you see this PR,
          one of:

          - someone reverted the rotation pattern,
          - a hotfix landed on main directly,
          - or another automation drifted main ahead of develop.

          Merge type: \`${{ steps.ff.outputs.merged }}\` (ff = fast-forward
          clean, merge = merge commit needed).

          ## Verification
          - [x] Auto-generated by \`.github/workflows/auto-backmerge.yml\`
          - [ ] No conflicts — manually review the diff if any
          EOF
          )"

      - name: Flag conflict for manual resolution
        if: steps.ff.outputs.merged == 'conflict'
        run: |
          echo "::error::Auto-backmerge produced conflicts; manual intervention required. Branch: ${{ steps.ff.outputs.branch }}"
          exit 1
