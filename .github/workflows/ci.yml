name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
    types: [opened, reopened, synchronize, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Phase 1 (v0.99.x) — path-filter dispatch so docs-only / blog-only PRs
  # skip the heavy lint/type/test steps below. Required-status-check names
  # stay stable (Lint & Format / Type Check / Test / Security Scan / Gate)
  # so branch protection keeps passing; only the inner steps short-circuit
  # when ``changes.code != 'true'``. Pattern mirrored from OpenClaw +
  # Hermes (frontier survey 2026-05-17).
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft != true
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'core/**'
              - 'plugins/**'
              - 'scripts/**'
              - 'tests/**'
              - 'AGENTS.md'
              - 'CHANGELOG.md'
              - '.pre-commit-config.yaml'
              - 'docs/architecture/exception-debt.*'
              - 'docs/architecture/extensibility-roadmap.md'
              - 'site/scripts/sync-stats.mjs'
              - 'site/public/llms.txt'
              - 'site/public/llms-full.txt'
              - 'site/src/app/docs/architecture/system-index/page.tsx'
              - 'site/src/data/geode/architecture-baseline.json'
              - 'site/src/data/geode/changelog.ts'
              - 'site/src/data/geode/sot.ts'
              - 'state/autoresearch/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/workflows/**'

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - name: Skip — no code change
        if: needs.changes.outputs.code != 'true'
        run: echo "::notice::Docs-only PR — skipping lint."
      - uses: actions/checkout@v4
        if: needs.changes.outputs.code == 'true'
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
        if: needs.changes.outputs.code == 'true'
      - if: needs.changes.outputs.code == 'true'
        run: uv sync
      - if: needs.changes.outputs.code == 'true'
        run: uv run ruff check core/ tests/ plugins/ scripts/
      - if: needs.changes.outputs.code == 'true'
        run: uv run ruff format --check core/ tests/ plugins/ scripts/
      - name: Dependency drift (deptry)
        if: needs.changes.outputs.code == 'true'
        run: uv run deptry .
      - name: Legacy import ratchet
        if: needs.changes.outputs.code == 'true'
        run: uv run python scripts/check_legacy_imports.py --base-ref origin/develop
      - name: Repo hygiene ratchet
        if: needs.changes.outputs.code == 'true'
        run: uv run python scripts/check_repo_hygiene.py
      - name: Slop growth ratchet
        if: needs.changes.outputs.code == 'true'
        run: uv run python scripts/check_slop_ratchet.py
      - name: Generated architecture baseline
        if: needs.changes.outputs.code == 'true'
        run: uv run python scripts/architecture_baseline.py --check
      - name: Architecture exception debt
        if: needs.changes.outputs.code == 'true'
        env:
          EXCEPTION_EVENT_MODE: ${{ github.event_name }}
          EXCEPTION_PR_BASE_REF: origin/${{ github.base_ref || github.ref_name }}
          EXCEPTION_PUSH_BASE_REF: ${{ github.event.before }}
        run: |
          base_ref="$EXCEPTION_PR_BASE_REF"
          if [[ "$EXCEPTION_EVENT_MODE" == "push" ]]; then
            if [[ ! "$EXCEPTION_PUSH_BASE_REF" =~ ^[0-9a-f]{40}$ ]] ||
               [[ "$EXCEPTION_PUSH_BASE_REF" == "0000000000000000000000000000000000000000" ]]; then
              echo "::error::Exception validation requires a non-zero github.event.before SHA."
              exit 1
            fi
            base_ref="$EXCEPTION_PUSH_BASE_REF"
          fi
          uv run python scripts/check_architecture_exceptions.py \
            --check \
            --base-ref "$base_ref"
      - name: Architecture roadmap invariants
        if: needs.changes.outputs.code == 'true'
        env:
          ROADMAP_EVENT_MODE: ${{ github.event_name }}
          ROADMAP_PR_BASE_REF: refs/remotes/origin/${{ github.base_ref || github.ref_name }}
          ROADMAP_PR_HEAD_REF: ${{ github.head_ref }}
          ROADMAP_PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          ROADMAP_PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          ROADMAP_REPOSITORY: ${{ github.repository }}
          ROADMAP_PUSH_BASE_REF: ${{ github.event.before }}
          ROADMAP_TARGET_BRANCH: ${{ github.base_ref || github.ref_name }}
        run: |
          base_ref="$ROADMAP_PR_BASE_REF"
          if [[ "$ROADMAP_EVENT_MODE" == "push" ]]; then
            if [[ ! "$ROADMAP_PUSH_BASE_REF" =~ ^[0-9a-f]{40}$ ]] ||
               [[ "$ROADMAP_PUSH_BASE_REF" == "0000000000000000000000000000000000000000" ]]; then
              echo "::error::Push validation requires a non-zero github.event.before SHA."
              exit 1
            fi
            base_ref="$ROADMAP_PUSH_BASE_REF"
          fi
          trusted_ref="$(uv run python scripts/resolve_architecture_roadmap_trust.py \
            --event-mode "$ROADMAP_EVENT_MODE" \
            --target-branch "$ROADMAP_TARGET_BRANCH" \
            --head-ref "$ROADMAP_PR_HEAD_REF" \
            --head-repo "$ROADMAP_PR_HEAD_REPO" \
            --repository "$ROADMAP_REPOSITORY" \
            --head-sha "$ROADMAP_PR_HEAD_SHA")"
          args=(
            --check
            --base-ref "$base_ref"
            --target-branch "$ROADMAP_TARGET_BRANCH"
            --event-mode "$ROADMAP_EVENT_MODE"
          )
          case "$trusted_ref" in
            refs/remotes/origin/main)
              args+=(--trusted-main-ref "$trusted_ref")
              ;;
            refs/remotes/origin/develop)
              args+=(--trusted-develop-ref "$trusted_ref")
              ;;
            "") ;;
            *)
              echo "::error::Roadmap trust resolver returned an unknown ref: $trusted_ref"
              exit 1
              ;;
          esac
          uv run python scripts/check_architecture_roadmap.py "${args[@]}"
      - name: llms.txt version drift ratchet
        if: needs.changes.outputs.code == 'true'
        run: uv run python scripts/check_llms_version.py
      - name: Petri bundle ratchet
        if: needs.changes.outputs.code == 'true'
        run: uv run python scripts/validate_petri_bundle.py
      - name: Hero viz layout ratchet
        if: needs.changes.outputs.code == 'true'
        # Static check — validates the committed
        # ``scripts/visualizations/layout_baseline.json`` against the
        # ``SITES`` list in ``verify_hero_layout.py`` without importing
        # manim. Engineers refresh the baseline locally via
        # ``uv run python scripts/visualizations/verify_hero_layout.py
        # --update-baseline`` and commit the JSON; CI only enforces
        # that every recorded ratio is < 1.0 (no text-overflow).
        run: uv run python scripts/visualizations/verify_hero_layout.py --static-check

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - name: Skip — no code change
        if: needs.changes.outputs.code != 'true'
        run: echo "::notice::Docs-only PR — skipping typecheck."
      - uses: actions/checkout@v4
        if: needs.changes.outputs.code == 'true'
      - uses: astral-sh/setup-uv@v5
        if: needs.changes.outputs.code == 'true'
      - if: needs.changes.outputs.code == 'true'
        run: uv sync
      - if: needs.changes.outputs.code == 'true'
        run: uv run mypy core/ plugins/ scripts/
      - name: Prompt integrity check
        if: needs.changes.outputs.code == 'true'
        run: uv run python -c "from core.llm.prompts import verify_prompt_integrity; verify_prompt_integrity(raise_on_drift=True)"

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - name: Skip — no code change
        if: needs.changes.outputs.code != 'true'
        run: echo "::notice::Docs-only PR — skipping tests."
      - uses: actions/checkout@v4
        if: needs.changes.outputs.code == 'true'
      - uses: astral-sh/setup-uv@v5
        if: needs.changes.outputs.code == 'true'
      # [audit] extra installs inspect_ai so tests/core/audit/ runs (otherwise
      # ``pytest.importorskip("inspect_ai.log")`` skips those modules
      # and the petri-bookkeeping code in core/audit/ shows up as 0%
      # covered — pushing total coverage below the 75% ratchet).
      - if: needs.changes.outputs.code == 'true'
        run: uv sync --extra audit
      - name: Run tests with coverage (xdist parallel, loadfile)
        if: needs.changes.outputs.code == 'true'
        # --dist=loadfile pins same-file tests to the same worker. Without
        # it, xdist can split TestAutoLearnHandler.{test_saves_pattern_on_match,
        # test_cooldown_prevents_rapid_fire} across workers — those two share
        # module-level state (cooldown timestamp), producing a flaky
        # FAILURE on develop→main PR #1220 (2026-05-17).
        run: uv run pytest -n auto --dist=loadfile --cov=core --cov-report=term-missing
      - name: Ratchet — minimum test count
        if: needs.changes.outputs.code == 'true'
        run: |
          count=$(uv run pytest --co -q 2>/dev/null | tail -1 | grep -oE '[0-9]+' | head -1)
          echo "Test count: $count"
          if [ "$count" -lt 2900 ]; then
            echo "::error::Test count $count < 2900 (ratchet). Do not delete tests without justification."
            exit 1
          fi

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - name: Skip — no code change
        if: needs.changes.outputs.code != 'true'
        run: echo "::notice::Docs-only PR — skipping security scan."
      - uses: actions/checkout@v4
        if: needs.changes.outputs.code == 'true'
      - uses: astral-sh/setup-uv@v5
        if: needs.changes.outputs.code == 'true'
      - if: needs.changes.outputs.code == 'true'
        run: uv sync
      - if: needs.changes.outputs.code == 'true'
        run: uv run bandit -r core/ -c pyproject.toml

  gate:
    name: Gate
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, security]
    steps:
      - run: echo "All checks passed"
