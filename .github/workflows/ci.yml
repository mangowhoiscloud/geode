name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: uv sync
      - run: uv run ruff check core/ tests/
      - run: uv run ruff format --check core/ tests/
      - name: Legacy import ratchet
        run: uv run python scripts/check_legacy_imports.py --base-ref origin/develop

  typecheck:
    name: Type Check
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - run: uv sync
      - run: uv run mypy core/
      - name: Prompt integrity check
        run: uv run python -c "from core.llm.prompts import verify_prompt_integrity; verify_prompt_integrity(raise_on_drift=True)"

  test:
    name: Test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - run: uv sync
      - name: Run tests with coverage
        run: uv run pytest --cov=core --cov-report=term-missing
      - name: Ratchet — minimum test count
        run: |
          count=$(uv run pytest --co -q 2>/dev/null | tail -1 | grep -oE '[0-9]+' | head -1)
          echo "Test count: $count"
          if [ "$count" -lt 2900 ]; then
            echo "::error::Test count $count < 2900 (ratchet). Do not delete tests without justification."
            exit 1
          fi

  security:
    name: Security Scan
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - run: uv sync
      - run: uv run bandit -r core/ -c pyproject.toml

  gate:
    name: Gate
    runs-on: self-hosted
    needs: [lint, typecheck, test, security]
    steps:
      - run: echo "All checks passed"
