name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - run: uv sync
      - run: uv run ruff check core/ tests/
      - run: uv run ruff format --check core/ tests/

  typecheck:
    name: Type Check
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - run: uv sync
      - run: uv run mypy core/

  test:
    name: Test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - run: uv sync
      - run: uv run pytest --cov=core --cov-report=term-missing

  security:
    name: Security Scan
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - run: uv sync
      - run: uv run bandit -r core/ -c pyproject.toml

  gate:
    name: Gate
    runs-on: self-hosted
    needs: [lint, typecheck, test, security]
    steps:
      - run: echo "All checks passed"
