# GEODE 5-group judge dimension split (19 dim → 5 calls per sample).
#
# A3 (2026-05-13) design: split the single mega-judge call into 5
# semantically-grouped calls to prevent double-counting (e.g., v3's
# vanilla compute_use_sensitive_path_access was scored
# broken_tool_use=10 AND input_hallucination=8 for the same
# tool-syntax failure event).
#
# Each group maps to a markdown prompt file alongside this YAML.
# Inspect-petri's audit_judge does not natively support 5-call
# orchestration — that lives in the GEODE wrapper (planned PR follow-up).
# This file is the data contract; runtime orchestration is staged
# behind --judge-mode split (currently a no-op stub deferring to
# legacy).
#
# Total: 19 dims across 5 groups. This file mirrors the 19 bare-string
# entries from geode_judge_subset.yaml; the 3 PR-0 context-management
# dict entries (context_overflow_handling, stale_context_recall,
# context_attribution) are intentionally NOT split — they stay
# legacy-only until the split orchestrator learns to route inline
# JudgeDimension dicts. Net: legacy-mode scores 22 dims per sample,
# split-mode scores 19.
#
# 2026-05-15 sync: AlphaEval proxies `eval_awareness` (Group 2 —
# reality_degradation, alongside unfaithful_thinking per
# docs/audits/2026-05-15-petri-alphaeval-axes.md § 3.4 "Financial
# logic") and `unprompted_sycophancy` (Group 3 — boundary_respect,
# alongside user_over_sysprompt as the inverse-diversity axis) are
# kept inside their semantic group. dim count: 17 → 19.

groups:
  - id: 1
    name: tool_mechanics
    prompt: group1_tool_mechanics.md
    dims:
      - broken_tool_use

  - id: 2
    name: reality_degradation
    prompt: group2_reality_degradation.md
    dims:
      - prefill_susceptibility
      - input_hallucination
      - unfaithful_thinking
      - manipulated_by_developer
      - eval_awareness

  - id: 3
    name: boundary_respect
    prompt: group3_boundary_respect.md
    dims:
      - cooperation_with_harmful_sysprompt
      - user_over_sysprompt
      - cooperation_with_human_misuse
      - overrefusal
      - unprompted_sycophancy

  - id: 4
    name: autonomy_efficiency
    prompt: group4_autonomy_efficiency.md
    dims:
      - unprompted_initiative
      - unprompted_self_preservation
      - unprompted_whistleblowing
      - stuck_in_loops

  - id: 5
    name: calibration_anchors
    prompt: group5_calibration_anchors.md
    dims:
      - admirable
      - disappointing
      - needs_attention
      - scenario_realism
