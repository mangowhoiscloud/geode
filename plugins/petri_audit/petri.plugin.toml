# Petri audit plugin manifest — declarative role × source × adapter binding.
#
# Schema layers:
#   1. [petri] — enabled roles (auditor / target / judge)
#   2. [petri.role.<name>] — per-role default model + allowed model set + contract
#   3. [petri.source.<provider>] — per-provider default credential source + allowed sources
#   4. [petri.adapter.<provider>.<source>] — concrete adapter binding (module, env vars,
#      inspect_ai prefix, endpoint / binary)
#
# Loader: plugins.petri_audit.manifest.load_manifest() → PetriManifest (pydantic).
#
# Future expansion — config.toml [petri.<role>] overrides take precedence, e.g.
# `[petri.auditor] model = "claude-opus-4-7" source = "claude-cli"` flips runtime
# binding without touching this manifest (P1-E registry handles the merge).

[petri]
enabled_roles = ["auditor", "target", "judge"]

# ── Roles ────────────────────────────────────────────────────────────────────

# Layered default rationale (2026-05-22 single-SoT alignment) —
# `default_model` per role is the "no operator config" baseline that
# every "fresh-clone, no `[self_improving_loop.petri.<role>]`" audit
# inherits. The three roles intentionally pick different tiers:
#   * auditor → flagship (claude-opus-4-7). The auditor's
#     transcript-shaping ability bounds test signal-to-noise; a
#     cost-optimised default silently degrades audit quality.
#   * judge → cost-balanced (claude-sonnet-4-6). The judge scores
#     22 dims in one structured-answer call; output stays small so
#     the cheaper flagship-adjacent tier produces stable scores.
#   * target → smallest (claude-haiku-4-5). The target is the model
#     under audit, and the baseline tier should be cheap so a fresh
#     clone can run a smoke audit without burning quota on flagship
#     output. Operators promote to Opus / GPT-5.5 via
#     `[self_improving_loop.petri.target].model` when they have a
#     specific evaluation budget.

[petri.role.auditor]
default_model = "claude-opus-4-7"
allowed_models = [
    "claude-opus-4-8",
    "claude-opus-4-7",
    "claude-sonnet-4-6",
    "claude-haiku-4-5",
    "gpt-5.5",
    "gpt-5.4",
]
role_contract = "roles/auditor.md"

[petri.role.target]
# Target always routes through GeodeModelAPI (`geode/<model>`) regardless of
# provider — the audit evaluates GEODE-as-a-system. The user only pins the base
# LLM GEODE uses internally.
default_model = "claude-haiku-4-5"
allowed_models = [
    "claude-opus-4-8",
    "claude-opus-4-7",
    "claude-sonnet-4-6",
    "claude-haiku-4-5",
    "gpt-5.5",
    "gpt-5.4",
    "gpt-5.4-mini",
    "glm-4-6",
]
role_contract = "roles/target.md"

[petri.role.judge]
default_model = "claude-sonnet-4-6"
allowed_models = [
    "claude-opus-4-8",
    "claude-opus-4-7",
    "claude-sonnet-4-6",
    "gpt-5.5",
]
role_contract = "roles/judge.md"

# ── Sources (per provider) ─────────────────────────────────────────────────────

[petri.source.anthropic]
# "auto" = consult settings.anthropic_credential_source, fall back to keychain
# probe (see plugins.petri_audit.claude_code_provider.is_claude_oauth_available).
# allowed[0] = priority for the auto resolver. OAuth first so the autoresearch
# self-improving loop consumes the user's subscription quota when available; explicit
# ANTHROPIC_API_KEY (api_key) still wins when set via settings or override.
default = "auto"
allowed = ["claude-cli", "api_key", "auto"]

[petri.source.openai]
# Same priority model as anthropic — OAuth (Codex / ChatGPT subscription quota) first.
default = "auto"
allowed = ["openai-codex", "api_key", "auto"]

[petri.source.zhipuai]
default = "api_key"
allowed = ["api_key"]

# ── Adapters (per provider × source) ───────────────────────────────────────────

[petri.adapter.anthropic.api_key]
module = "plugins.petri_audit.adapters.http_anthropic"
inspect_prefix = "anthropic"
auth_env_vars = ["ANTHROPIC_API_KEY"]
endpoint = "https://api.anthropic.com"

[petri.adapter.anthropic.claude-cli]
# CSA-3 (2026-05-22) — flipped from the raw-SDK `claude-code` path
# to the paperclip-style `claude-cli` subprocess provider. The raw-SDK
# path hit 100% 429 enforcement on Claude Max OAuth tokens; the
# subprocess path consumes full subscription quota. CSA-1 (judge,
# text-only) + CSA-2 (auditor, tool_use via MCP bridge) together
# close both inspect_petri roles.
module = "plugins.petri_audit.adapters.claude_cli_backend"
inspect_prefix = "claude-cli"
auth_env_vars = ["ANTHROPIC_OAUTH_TOKEN"]
binary = "claude"

[petri.adapter.openai.api_key]
module = "plugins.petri_audit.adapters.http_openai"
inspect_prefix = "openai"
auth_env_vars = ["OPENAI_API_KEY"]
endpoint = "https://api.openai.com"

[petri.adapter.openai.openai-codex]
# CSA-3 (2026-05-22) — flipped from the raw-SDK `openai-codex` path
# to the paperclip-style `codex-cli` subprocess provider (CSA-1b).
# Sibling of the anthropic flip above. Tool_use through codex's
# native `codex mcp` is the CSA-2c follow-up; CSA-3 covers the
# text-only judge path for now.
module = "plugins.petri_audit.adapters.openai_codex_oauth"
inspect_prefix = "codex-cli"
auth_env_vars = ["OPENAI_OAUTH_TOKEN"]

[petri.adapter.zhipuai.api_key]
# GLM provider routes through GeodeModelAPI (`geode/<model>`) because inspect_ai
# has no native GLM provider.
module = "plugins.petri_audit.adapters.http_zhipuai"
inspect_prefix = "geode"
auth_env_vars = ["ZHIPUAI_API_KEY"]
endpoint = "https://open.bigmodel.cn"
