[project]
name = "geode"
version = "6.0.0"
description = "GEODE — Undervalued IP Discovery Agent CLI Demo"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "anthropic>=0.80.0",
    "langgraph>=1.0.0",
    "langgraph-checkpoint-sqlite>=3.0.0",
    "numpy>=2.2.0",
    "openai>=2.0.0",
    "pydantic>=2.10.0",
    "pydantic-settings>=2.7.0",
    "python-dotenv>=1.0.0",
    "rich>=14.0.0",
    "simple-term-menu>=1.6.0",
    "typer>=0.15.0",
]

[project.scripts]
geode = "geode.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
testpaths = ["tests"]

[dependency-groups]
dev = [
    "mypy>=1.19.1",
    "pytest>=9.0.2",
    "ruff>=0.15.2",
]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM"]

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
