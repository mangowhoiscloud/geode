<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" role="img" aria-label="Git champion chain: promoted scaffolds extend a linear chain of commits; rejected mutations branch off and dead-end">
  <!-- Hand-authored signature SVG. Tokens: site/DESIGN.md section 2 (Axolotl Rose).
       Rose #F49BC4 = promoted champion chain, muted #6E6880 = rejected
       mutations (dead-end branches). Canon vocabulary (CONTENT-CANON.md section 2). -->
  <style>
    text { font-family: "Fira Code", ui-monospace, SFMono-Regular, Menlo, monospace; }
    .lbl { font-size: 15px; fill: #ABA4BC; }
    .lbl-head { font-size: 15px; fill: #F2EEF5; }
    .lbl-muted { font-size: 15px; fill: #6E6880; }
    .chain { stroke: #F49BC4; stroke-width: 2; fill: none; }
    .dead { stroke: #6E6880; stroke-width: 1.6; fill: none; stroke-dasharray: 5 4; }
    .commit { fill: #14121B; stroke: #F49BC4; stroke-width: 2; }
    .reject { fill: none; stroke: #6E6880; stroke-width: 1.6; }
  </style>
  <defs>
    <marker id="cr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#F49BC4"/>
    </marker>
  </defs>

  <!-- legend -->
  <line class="chain" x1="60" y1="42" x2="110" y2="42"/>
  <text class="lbl" x="122" y="47">promote · extends the chain</text>
  <line class="dead" x1="60" y1="70" x2="110" y2="70"/>
  <text class="lbl-muted" x="122" y="75">reject · reverted, never enters the chain</text>

  <!-- rejected mutation branches (dead ends) -->
  <line class="dead" x1="250" y1="210" x2="322" y2="138"/>
  <circle class="reject" cx="328" cy="132" r="8"/>
  <text class="lbl-muted" x="346" y="137">reject</text>

  <line class="dead" x1="410" y1="210" x2="482" y2="138"/>
  <circle class="reject" cx="488" cy="132" r="8"/>
  <text class="lbl-muted" x="506" y="137">reject</text>

  <line class="dead" x1="570" y1="210" x2="642" y2="138"/>
  <circle class="reject" cx="648" cy="132" r="8"/>
  <text class="lbl-muted" x="666" y="137">reject</text>

  <!-- champion chain -->
  <line class="chain" x1="100" y1="210" x2="240" y2="210"/>
  <line class="chain" x1="260" y1="210" x2="400" y2="210"/>
  <line class="chain" x1="420" y1="210" x2="560" y2="210"/>
  <line class="chain" x1="580" y1="210" x2="720" y2="210"/>
  <line class="chain" x1="740" y1="210" x2="850" y2="210" marker-end="url(#cr)"/>

  <circle class="commit" cx="90" cy="210" r="10"/>
  <circle class="commit" cx="250" cy="210" r="10"/>
  <circle class="commit" cx="410" cy="210" r="10"/>
  <circle class="commit" cx="570" cy="210" r="10"/>
  <circle cx="730" cy="210" r="10" fill="#F49BC4" stroke="#F49BC4" stroke-width="2"/>

  <text class="lbl" x="90" y="248" text-anchor="middle">gen-0</text>
  <text class="lbl" x="250" y="248" text-anchor="middle">promote</text>
  <text class="lbl" x="410" y="248" text-anchor="middle">promote</text>
  <text class="lbl" x="570" y="248" text-anchor="middle">promote</text>
  <text class="lbl-head" x="730" y="248" text-anchor="middle">champion (HEAD)</text>
  <text class="lbl-muted" x="852" y="190" text-anchor="end">next cycle</text>
</svg>
