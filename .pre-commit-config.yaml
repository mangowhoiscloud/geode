# Pre-commit hooks — mirrors CI pipeline locally
# Install: uv run pre-commit install
# Run all: uv run pre-commit run --all-files
# Skip (emergency): git commit --no-verify

repos:
  # Ruff — lint + format (replaces flake8, isort, black)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.2
    hooks:
      - id: ruff
        name: ruff lint
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi]
      - id: ruff-format
        name: ruff format
        types_or: [python, pyi]

  # Standard pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: debug-statements

  # Local hooks — use project virtualenv (uv run) for full dependency access
  - repo: local
    hooks:
      - id: mypy
        name: mypy type check
        entry: uv run mypy --cache-dir /tmp/.mypy_cache_geode core/
        language: system
        pass_filenames: false
        types: [python]

      - id: bandit
        name: bandit security
        entry: uv run bandit -r core/ -c pyproject.toml
        language: system
        pass_filenames: false
        types: [python]
