# Pre-commit hooks — mirrors CI pipeline locally
# Install: uv run pre-commit install
# Run all: uv run pre-commit run --all-files
# Skip (emergency): git commit --no-verify

repos:
  # Ruff — lint + format (replaces flake8, isort, black)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.2
    hooks:
      - id: ruff
        name: ruff lint
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi]
      - id: ruff-format
        name: ruff format
        types_or: [python, pyi]

  # codespell — typo detection in identifiers/strings/comments
  - repo: https://github.com/codespell-project/codespell
    rev: v2.3.0
    hooks:
      - id: codespell
        additional_dependencies: [tomli]

  # Standard pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: debug-statements

  # yamllint — structural validation for YAML that ships with the Pages
  # bundle (judge_dim sets + any petri-bundle config). Scoped narrowly so
  # the broader codebase YAML (helm charts, etc.) keeps the existing
  # check-yaml gate without dragging in stricter rules. See
  # docs/architecture/render-lint.md for the rule-by-rule rationale.
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        name: yamllint (petri YAML)
        args: [-c, .yamllint.yaml, --strict]
        files: ^(plugins/petri_audit/judge_dims/.*\.ya?ml|docs/self-improving/petri-bundle/.*\.ya?ml)$

  # pymarkdownlnt — markdown render gate for the docs that get published
  # to GitHub Pages or linked from the petri-bundle README. Scope is
  # intentionally narrow (see scripts/lint_pages_markdown.sh for the
  # allowlist + rationale). Legacy audit docs predating the gate are
  # left alone — opening that scope would force a content rewrite.
  # See docs/architecture/render-lint.md for the rule-by-rule rationale.
  - repo: local
    hooks:
      - id: pymarkdown-pages
        name: pymarkdown (Pages-published docs)
        entry: scripts/lint_pages_markdown.sh
        language: system
        pass_filenames: false
        files: ^(docs/audits/.*\.md|docs/self-improving/petri-bundle/README\.md|docs/architecture/render-lint\.md|\.pymarkdown\.json)$

  # Local hooks — use project virtualenv (uv run) for full dependency access
  - repo: local
    hooks:
      - id: mypy
        name: mypy type check
        entry: uv run --frozen mypy --no-incremental core/ plugins/
        language: system
        pass_filenames: false
        types: [python]

      - id: bandit
        name: bandit security
        entry: uv run --frozen bandit -r core/ -c pyproject.toml --quiet
        language: system
        pass_filenames: false
        types: [python]

      - id: deptry
        name: deptry dependency drift
        entry: uv run --frozen deptry .
        language: system
        pass_filenames: false
        types: [python]
