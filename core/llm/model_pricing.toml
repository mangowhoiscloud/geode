# glm-5.2 supports up to 1M context via the ``glm-5.2[1m]`` DevPack/Claude-Code
# routing form (docs.z.ai/devpack/tool/claude); the plain ``glm-5.2`` id GEODE
# calls over the OpenAI-compatible PAYG endpoint uses the standard window, so
# keep the family value here (conservative for the 200K guard's early-trip
# margin — never over-claims headroom). Bump if GEODE adopts the ``[1m]`` form.
