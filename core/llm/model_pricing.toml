# ── ZhipuAI GLM (verified 2026-04-26 against docs.z.ai/guides/overview/pricing)
# v0.52.4 — refreshed pricing; pre-fix glm-5.1 / glm-5 were stale.
# glm-4.7 retained because Coding Plan defaults still route Opus/Sonnet
# env aliases to it (see docs.z.ai/devpack/overview).
#
# GLM uses the openai derive formula (cache_read = explicit cached, no
# reasoning multiplier) by manifest convention.

# GLM cached-input rates now applied: PR-CACHE-COST-ACCOUNTING wired
# ``translate_chat_response`` to surface ``prompt_tokens_details.cached_tokens``
# + made the openai-derive cost subtract cached from billable input, so
# ``cached_per_mtok`` is honoured (was parsed-but-dropped before). Rates from
# docs.z.ai/guides/overview/pricing (2026-06; cache storage free, limited-time).
[pricing.openai."glm-5.2"]
input_per_mtok = 1.40
cached_per_mtok = 0.26
output_per_mtok = 4.40

[pricing.openai."glm-5.1"]
input_per_mtok = 1.40
cached_per_mtok = 0.26
output_per_mtok = 4.40

[pricing.openai."glm-5"]
input_per_mtok = 1.00
cached_per_mtok = 0.20
output_per_mtok = 3.20

[pricing.openai."glm-5-turbo"]
input_per_mtok = 1.20
cached_per_mtok = 0.24
output_per_mtok = 4.00

[pricing.openai."glm-4.7"]
input_per_mtok = 0.60
cached_per_mtok = 0.11
output_per_mtok = 2.20

# Default learning-extraction model (settings.learning_extract_model). The
# free tier is limited-time: when the promo ends this reverts to standard GLM
# pricing, so a cost watcher should re-pin or update these once it lapses.
[pricing.openai."glm-4.7-flash"]
input_per_mtok = 0.00
output_per_mtok = 0.00  # free tier (limited-time)

# ── Context windows (verified 2026-04-26 / GLM refreshed 2026-06-25) ──────
# Anthropic: 1M tokens for opus-4-6/7/8 + sonnet-4-6; 200K for legacy.
# OpenAI 5.x: 1.05M tokens for gpt-5.5/5.4; 400K for gpt-5.2 +
# mini/nano variants; 200K for 5.3-codex + reasoning (o3/o4-mini). GLM:
# every registered id stays at the precise 202_752 guard — glm-5.2's 1M
# window is the DevPack ``[1m]`` alias surface, not GEODE's
# OpenAI-compatible PAYG path (0.99.246 decision).

[context_windows]
"claude-fable-5"             = 1000000
"claude-opus-4-8"            = 1000000
"claude-opus-4-7"            = 1000000
"claude-opus-4-6"            = 1000000
"claude-opus-4-5"            = 200000
"claude-opus-4-1"            = 200000
"claude-opus-4"              = 200000
"claude-sonnet-4-6"          = 1000000
"claude-sonnet-4-5-20250929" = 200000
"claude-sonnet-4"            = 200000
"claude-haiku-4-5-20251001"  = 200000
"gpt-5.5"                    = 1050000
"gpt-5.4"                    = 1050000
"gpt-5.2"                    = 400000
"gpt-5.4-mini"               = 400000
"gpt-5.4-nano"               = 400000
"gpt-5-mini"                 = 400000
